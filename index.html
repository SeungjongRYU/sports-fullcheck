<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>풀체크 스포츠 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #555568;
  --green: #22c97a;
  --green-dim: rgba(34,201,122,0.12);
  --blue: #4da8ff;
  --blue-dim: rgba(77,168,255,0.12);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.12);
  --purple: #a78bfa;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}
.mono { font-family: 'DM Mono', monospace; }

/* Layout */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
.logo span { color: var(--green); }
.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text2);
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.err { background: var(--red); }
.dot.wait { background: var(--amber); }

.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow-y: auto;
  position: sticky;
  top: 56px;
}
.sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.api-input-wrap { display: flex; gap: 6px; }
.api-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.2s;
}
.api-input:focus { border-color: var(--green); }
.btn-sm {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-sm:hover { background: var(--bg); border-color: var(--green); color: var(--green); }

.sport-tabs { display: flex; gap: 4px; }
.sport-tab {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 4px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.sport-tab.on {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.league-tabs { display: flex; flex-wrap: wrap; gap: 4px; }
.league-tab {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.league-tab.on {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

.btn-fetch {
  width: 100%;
  background: var(--green);
  border: none;
  border-radius: var(--radius);
  padding: 11px;
  color: #000;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: -0.2px;
}
.btn-fetch:hover { background: #1fb86b; transform: translateY(-1px); }
.btn-fetch:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-row label { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; cursor: pointer; }
input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--green); }
input[type=range] { flex: 1; accent-color: var(--green); height: 3px; }
.odds-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green); min-width: 28px; }

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-item {
  background: var(--bg2);
  padding: 12px 16px;
  text-align: center;
}
.stat-val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.05em; }

/* Game list */
.game-list-wrap { padding: 12px; flex: 1; }
.game-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.game-card:hover { border-color: var(--border2); }
.game-card.sel { border-color: var(--green); background: rgba(34,201,122,0.04); }
.game-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.game-matchup { font-size: 13px; font-weight: 500; line-height: 1.3; }
.game-time { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.grade-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.grade-A { background: rgba(34,201,122,0.15); color: var(--green); border: 1px solid rgba(34,201,122,0.3); }
.grade-B { background: rgba(77,168,255,0.15); color: var(--blue); border: 1px solid rgba(77,168,255,0.3); }
.grade-C { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
.grade-P { background: rgba(136,136,160,0.15); color: var(--text2); border: 1px solid var(--border); }
.odds-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.odds-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 10px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}
.progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s; border-radius: 1px; }
.progress-msg { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* Detail panel */
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  height: calc(100vh - 56px);
}
.empty-detail {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  gap: 8px;
}
.empty-icon { font-size: 32px; opacity: 0.3; }

.detail-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
}
.detail-title { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }

.rec-main { font-size: 24px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
.rec-sub { font-size: 13px; color: var(--text2); }
.rec-meta-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 14px; }
.rec-meta-item { background: var(--bg3); border-radius: var(--radius); padding: 10px; text-align: center; }
.rec-meta-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.rec-meta-val { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }

.reason-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
.risk-box {
  background: var(--amber-dim);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--amber);
  margin-top: 10px;
}
.checklist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 6px; }
.cl-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 7px 9px;
  font-size: 11px;
  color: var(--text2);
}
.cl-icon { width: 14px; height: 14px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.cl-ok { background: rgba(34,201,122,0.2); color: var(--green); }
.cl-fail { background: rgba(255,95,95,0.2); color: var(--red); }
.cl-wait { background: rgba(245,166,35,0.2); color: var(--amber); }

.action-tag {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  margin-right: 6px;
  margin-top: 4px;
}

/* Mobile */
.mobile-back { display: none; }

@media (max-width: 768px) {
  .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; top: 0; }
  .main { flex-direction: column; }
  .detail-panel { height: auto; padding: 14px; }
  .stats-bar { grid-template-columns: repeat(2,1fr); }
  .rec-meta-grid { grid-template-columns: repeat(2,1fr); }
  .game-card { padding: 10px; }
  .sidebar { display: none; }
  .sidebar.show { display: flex; }
  .detail-panel { display: none; }
  .detail-panel.show { display: block; }
  .mobile-back {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 12px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .topbar { padding: 0 14px; }
  .logo { font-size: 13px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="logo">풀체크 <span>스포츠</span> 분석</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="status-pill">
        <div class="dot" id="apiDot"></div>
        <span id="apiStatText">API 대기</span>
      </div>
      <div class="status-pill mono" id="remText" style="display:none">
        잔여 <span id="remVal">—</span>
      </div>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="st-games">0</div><div class="stat-label">수집 경기</div></div>
    <div class="stat-item"><div class="stat-val" id="st-picks" style="color:var(--green)">0</div><div class="stat-label">실행 가능 픽</div></div>
    <div class="stat-item"><div class="stat-val" id="st-done">0</div><div class="stat-label">분석 완료</div></div>
    <div class="stat-item"><div class="stat-val" id="st-rate">—</div><div class="stat-label">평균 확신도</div></div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">API 설정</div>
        <div class="api-input-wrap">
          <input class="api-input" id="apiKeyInput" type="password" placeholder="The Odds API 키...">
          <button class="btn-sm" onclick="saveKey()">저장</button>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px" id="claudeKeyNote">Claude API 키는 분석 버튼 클릭 시 입력 가능</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Claude API 키</div>
        <div class="api-input-wrap">
          <input class="api-input" id="claudeKeyInput" type="password" placeholder="sk-ant-...">
          <button class="btn-sm" onclick="saveClaudeKey()">저장</button>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">claude.ai → 설정 → API Keys에서 발급</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">종목</div>
        <div class="sport-tabs">
          <button class="sport-tab on" onclick="setSport('baseball',this)">야구</button>
          <button class="sport-tab" onclick="setSport('basketball',this)">농구</button>
          <button class="sport-tab" onclick="setSport('soccer',this)">축구</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">리그</div>
        <div class="league-tabs" id="leagueTabs"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">필터</div>
        <div class="filter-row" style="margin-bottom:8px">
          <label><input type="checkbox" id="actionOnly"> 실행픽만</label>
        </div>
        <div class="filter-row">
          <span style="font-size:11px;color:var(--text2)">최소배당</span>
          <input type="range" min="1.3" max="2.5" step="0.1" value="1.5" id="minOdds"
            oninput="document.getElementById('minOddsVal').textContent=parseFloat(this.value).toFixed(1)">
          <span class="odds-val" id="minOddsVal">1.5</span>
        </div>
      </div>

      <div class="sidebar-section">
        <button class="btn-fetch" id="fetchBtn" onclick="fetchGames()">
          배당 수집 + 풀체크 분석 시작
        </button>
      </div>

      <div class="game-list-wrap" id="gameListWrap">
        <div style="text-align:center;color:var(--text3);font-size:12px;padding:20px 0">
          설정 후 분석 시작하세요
        </div>
      </div>
    </div>

    <!-- Detail -->
    <div class="detail-panel" id="detailPanel">
      <div class="empty-detail" id="emptyDetail">
        <div class="empty-icon">◎</div>
        <div style="font-size:13px">경기를 선택하면 풀체크 분석 결과가 표시됩니다</div>
        <div style="font-size:11px;color:var(--text3)">분석 완료 후 게임 카드를 클릭하세요</div>
      </div>
      <div id="detailContent" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const CFG = {
  baseball: {
    leagues: [{l:'MLB',k:'baseball_mlb'},{l:'NPB',k:'baseball_japan_npb'}],
    checklist: ['공식일정/KST변환','선발 K%/BB%/K-BB%','xERA/xFIP/BABIP','Hard Hit%/Barrel%/GB%','구속·구종 변화','구종별 Run Value','상대 pitch-type OPS','7일 ISO/SLG','좌우 splits/타순','불펜 WHIP','불펜 3경기 실점','레버리지/마무리 연투','날씨/구장 효과','ML/F5/Total 비교','오프닝→현재 라인이동'],
    rules: `엄격 야구 풀체크:
1. 선발 최근3경기: K%/BB%/K-BB%/xERA/xFIP/BABIP/Hard Hit%/Barrel%/GB%/구속변화/구종mix/Run Value 웹서치
2. 상대타선: pitch-type OPS/7일 ISO·SLG/좌우splits/예상타순/최근장타력
3. 불펜: WHIP/최근3경기실점/레버리지소모/마무리·셋업 연투여부
4. 환경: 날씨/구장 파크팩터
5. 시장: ML vs RunLine vs F5 vs Total 오프닝→현재 흐름 비교
6. 분기규칙: 불펜고위험→ML금지·F5우선 / 홈장타팀(Braves/Phillies형)→오버·홈득점가산 / 저득점구조 모두충족→언더완화 / 선발만보고추천절대금지
7. A급: 전항목확인+배당1.5이상+불펜분기완료`
  },
  basketball: {
    leagues: [{l:'NBA',k:'basketball_nba'},{l:'KBL',k:'basketball_nbl'},{l:'EuroLeague',k:'basketball_euroleague'}],
    checklist: ['공식일정/KST변환','실제출전/GTD/부상','ORTG/DRTG 최신값','최근3경기 Pace','3PT 시도량/성공률','상대 perimeter defense','리바운드 차이','턴오버','벤치 생산성','클러치 라인업','시리즈 전술흐름','오프닝→현재 spread/total','ML/언더/오버 비교','백투백/휴식일차이','홈 외곽폭발 위험'],
    rules: `엄격 농구 풀체크 5단계:
1. 일정검증→2.로스터검증→3.핵심지표→4.시장분석→5.EV등급
핵심지표: ORTG/DRTG/Pace(최근3G)/3PT시도량·성공률/perimeter defense/리바운드/턴오버/벤치/클러치/시리즈전술
규칙: Pace만보고언더금지 / 홈3PT폭발위험반영 / 시장과열보다matchup dominance우선
플레이오프: 수비·외곽변동성 가중치2배 / 언더·Pace억제우선
A급: 로스터+ORTG·DRTG·Pace·3PT 전확인+배당1.5이상`
  },
  soccer: {
    leagues: [{l:'UCL',k:'soccer_uefa_champs_league'},{l:'EPL',k:'soccer_epl'},{l:'MLS',k:'soccer_usa_mls'},{l:'라리가',k:'soccer_spain_la_liga'},{l:'분데스',k:'soccer_germany_bundesliga'}],
    checklist: ['공식일정/KST변환','예상라인업','부상/징계','최근5경기폼','xG','xGA','홈/원정구분','일정피로도','전술상성','날씨/구장','배당흐름','1X2/핸디/언더오버','단일픽원칙','배당1.5이상확인'],
    rules: `엄격 축구 풀체크:
1. xG/xGA 최근5경기 웹서치 필수
2. 라인업·부상·징계 미확인시 A급금지
3. 일정피로도 과소평가금지
4. 전술상성(압박vs전환) 명시
5. 경기당 단일픽 원칙 절대준수
6. 배당1.5미만 BTTS포함 전부제외
7. A급: 라인업+xG+전술+배당조건 모두통과`
  }
};

let sport = 'baseball';
let league = 'baseball_mlb';
let leagueLabel = 'MLB';
let games = [];
let analyses = {};
let oddsApiKey = '';
let claudeApiKey = '';
let selectedGameId = null;

async function saveKey() {
  oddsApiKey = document.getElementById('apiKeyInput').value.trim();
  showToast('The Odds API 키 저장됨');
  await loadSportsList();
}

async function loadSportsList() {
  if (!oddsApiKey) return;
  try {
    const res = await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${oddsApiKey}`);
    if (!res.ok) return;
    const data = await res.json();
    const baseball = data.filter(s => s.group === 'Baseball' && s.active);
    const basketball = data.filter(s => s.group === 'Basketball' && s.active);
    const soccer = data.filter(s => (s.group === 'Soccer' || s.group === 'Football') && s.active);
    if (baseball.length) CFG.baseball.leagues = baseball.slice(0,5).map(s => ({l: s.title.replace('Baseball - ','').replace('MLB','MLB'), k: s.key}));
    if (basketball.length) CFG.basketball.leagues = basketball.slice(0,5).map(s => ({l: s.title.replace('Basketball - ',''), k: s.key}));
    if (soccer.length) {
      const priority = ['EPL','UEFA','MLS','La Liga','Bundesliga'];
      const sorted = soccer.sort((a,b) => { const ai = priority.findIndex(p => a.title.includes(p)); const bi = priority.findIndex(p => b.title.includes(p)); return (ai===-1?99:ai)-(bi===-1?99:bi); });
      CFG.soccer.leagues = sorted.slice(0,6).map(s => ({l: s.title.replace('Soccer - ','').replace('Football - ',''), k: s.key}));
    }
    league = CFG[sport].leagues[0].k;
    leagueLabel = CFG[sport].leagues[0].l;
    renderLeagues();
    showToast('리그 목록 갱신 완료');
  } catch(e) {}
}
function saveClaudeKey() {
  claudeApiKey = document.getElementById('claudeKeyInput').value.trim();
  showToast('Claude API 키 저장됨');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#22c97a;color:#000;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn 0.2s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function setSport(s, btn) {
  sport = s;
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  league = CFG[s].leagues[0].k;
  leagueLabel = CFG[s].leagues[0].l;
  games = []; analyses = {};
  clearUI();
  renderLeagues();
}

function renderLeagues() {
  const wrap = document.getElementById('leagueTabs');
  wrap.innerHTML = '';
  CFG[sport].leagues.forEach(l => {
    const b = document.createElement('button');
    b.className = 'league-tab' + (l.k === league ? ' on' : '');
    b.textContent = l.l;
    b.onclick = () => {
      league = l.k; leagueLabel = l.l;
      document.querySelectorAll('.league-tab').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      games = []; analyses = {};
      clearUI();
    };
    wrap.appendChild(b);
  });
}

function clearUI() {
  document.getElementById('st-games').textContent = '0';
  document.getElementById('st-picks').textContent = '0';
  document.getElementById('st-done').textContent = '0';
  document.getElementById('st-rate').textContent = '—';
  document.getElementById('gameListWrap').innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12px;padding:20px 0">설정 후 분석 시작하세요</div>';
  document.getElementById('emptyDetail').style.display = 'flex';
  document.getElementById('detailContent').style.display = 'none';
  selectedGameId = null;
}

function fmt(v) { return v ? parseFloat(v).toFixed(2) : '—'; }
function kst(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function getOdds(g, mkt) {
  for (const bk of (g.bookmakers || [])) {
    const m = bk.markets.find(x => x.key === mkt);
    if (m) return m;
  }
  return null;
}
function gradeClass(g) {
  if (!g) return 'grade-P';
  if (g === 'A' || g === 'A-') return 'grade-A';
  if (g === 'B+' || g === 'B') return 'grade-B';
  if (g === 'C') return 'grade-C';
  return 'grade-P';
}

async function fetchGames() {
  if (!oddsApiKey) { alert('The Odds API 키를 먼저 입력하세요.'); return; }
  if (!claudeApiKey) { alert('Claude API 키를 먼저 입력하세요.\nclaude.ai → 설정 → API Keys'); return; }
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = '수집 중...';
  setApiStatus('wait', '연결 중...');
  try {
    const url = `https://api.the-odds-api.com/v4/sports/${league}/odds/?apiKey=${oddsApiKey}&regions=us&markets=h2h,spreads,totals&oddsFormat=decimal&dateFormat=iso`;
    const res = await fetch(url);
    const rem = res.headers.get('x-requests-remaining');
    if (rem) {
      document.getElementById('remText').style.display = 'flex';
      document.getElementById('remVal').textContent = rem;
    }
    if (!res.ok) {
      const e = await res.json();
      setApiStatus('err', 'API 오류');
      alert('API 오류: ' + (e.message || res.status));
      btn.disabled = false; btn.textContent = '배당 수집 + 풀체크 분석 시작';
      return;
    }
    setApiStatus('ok', '연결됨');
    games = (await res.json()).slice(0, 12);
    document.getElementById('st-games').textContent = games.length;
    renderGameList();
    btn.disabled = false; btn.textContent = '배당 수집 + 풀체크 분석 시작';
    games.forEach((g, i) => setTimeout(() => analyzeGame(g.id), i * 1000));
  } catch (e) {
    setApiStatus('err', '네트워크 오류');
    alert('네트워크 오류: ' + e.message + '\nCORS 문제일 수 있습니다. 로컬 파일로 실행 중이라면 Chrome 확장 또는 서버가 필요합니다.');
    btn.disabled = false; btn.textContent = '배당 수집 + 풀체크 분석 시작';
  }
}

function setApiStatus(state, text) {
  const dot = document.getElementById('apiDot');
  dot.className = 'dot ' + state;
  document.getElementById('apiStatText').textContent = text;
}

function renderGameList() {
  const wrap = document.getElementById('gameListWrap');
  if (!games.length) { wrap.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12px;padding:20px">경기 없음</div>'; return; }
  wrap.innerHTML = '';
  games.forEach(g => {
    const h2h = getOdds(g, 'h2h'), tot = getOdds(g, 'totals'), spd = getOdds(g, 'spreads');
    const home = g.home_team, away = g.away_team;
    const ho = h2h?.outcomes?.find(o => o.name === home)?.price;
    const ao = h2h?.outcomes?.find(o => o.name === away)?.price;
    const tl = tot?.outcomes?.[0]?.point;
    const sl = spd?.outcomes?.find(o => o.name === home)?.point;
    const card = document.createElement('div');
    card.className = 'game-card';
    card.id = 'gc-' + g.id;
    card.onclick = () => selectGame(g.id);
    card.innerHTML = `
      <div class="game-header">
        <div>
          <div class="game-matchup">${away}<br>@ ${home}</div>
          <div class="game-time">${kst(g.commence_time)} KST</div>
        </div>
        <div id="gbadge-${g.id}"></div>
      </div>
      <div class="odds-chips">
        ${ho ? `<span class="odds-chip">홈 ${fmt(ho)}</span>` : ''}
        ${ao ? `<span class="odds-chip">원정 ${fmt(ao)}</span>` : ''}
        ${tl ? `<span class="odds-chip">총점 ${tl}</span>` : ''}
        ${sl !== undefined && sl !== null ? `<span class="odds-chip">핸디 ${sl > 0 ? '+' : ''}${sl}</span>` : ''}
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pf-${g.id}"></div></div>
      <div class="progress-msg" id="pm-${g.id}">대기 중...</div>
    `;
    wrap.appendChild(card);
  });
}

function selectGame(id) {
  selectedGameId = id;
  document.querySelectorAll('.game-card').forEach(c => c.classList.remove('sel'));
  const card = document.getElementById('gc-' + id);
  if (card) card.classList.add('sel');
  const text = analyses[id];
  if (text && text !== 'pending' && text !== 'error') {
    showDetail(id, text);
  } else {
    document.getElementById('emptyDetail').style.display = 'flex';
    document.getElementById('detailContent').style.display = 'none';
  }
  // Mobile: show detail
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('show');
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('detailPanel').style.display = 'block';
  }
}

function animBar(id) {
  const msgs = {
    baseball: ['일정·KST 검증...','선발 xERA/BABIP 서치...','타선 pitch-type OPS...','불펜 WHIP/연투 확인...','날씨·파크팩터...','ML/F5 시장 비교...','풀체크 등급 산출...'],
    basketball: ['일정·로스터 검증...','ORTG/DRTG 서치...','Pace·3PT 확인...','perimeter defense...','시장 spread/total...','EV 등급 산출...'],
    soccer: ['일정·라인업 검증...','xG/xGA 서치...','부상·징계 확인...','전술 상성 분석...','배당 흐름...','단일픽 EV 산출...']
  };
  const list = msgs[sport] || msgs.baseball;
  let w = 0, mi = 0;
  const iv = setInterval(() => {
    w = Math.min(w + 3, 88);
    const fill = document.getElementById('pf-' + id);
    if (fill) fill.style.width = w + '%';
    const msg = document.getElementById('pm-' + id);
    if (msg && w % 20 === 0 && mi < list.length) msg.textContent = list[mi++];
    if (w >= 88) clearInterval(iv);
  }, 180);
  return iv;
}

async function analyzeGame(gameId) {
  if (analyses[gameId]) return;
  analyses[gameId] = 'pending';
  const g = games.find(x => x.id === gameId);
  if (!g) return;
  const iv = animBar(gameId);
  const h2h = getOdds(g, 'h2h'), tot = getOdds(g, 'totals'), spd = getOdds(g, 'spreads');
  const home = g.home_team, away = g.away_team;
  const ho = h2h?.outcomes?.find(o => o.name === home)?.price;
  const ao = h2h?.outcomes?.find(o => o.name === away)?.price;
  const tl = tot?.outcomes?.[0]?.point;
  const sl = spd?.outcomes?.find(o => o.name === home)?.point;
  const prompt = buildPrompt(sport, leagueLabel, away, home, kst(g.commence_time), ao, ho, sl, tl);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': claudeApiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-usage': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('\n') || '';
    analyses[gameId] = text;
    clearInterval(iv);
    const fill = document.getElementById('pf-' + gameId);
    if (fill) fill.style.width = '100%';
    const pmsg = document.getElementById('pm-' + gameId);
    if (pmsg) pmsg.textContent = '분석 완료';
    const p = parseResult(text);
    const badge = document.getElementById('gbadge-' + gameId);
    if (badge && p.grade) badge.innerHTML = `<span class="grade-badge ${gradeClass(p.grade)}">${p.grade}</span>`;
    updateStats();
    if (selectedGameId === gameId) showDetail(gameId, text);
  } catch (e) {
    analyses[gameId] = 'error';
    clearInterval(iv);
    const pmsg = document.getElementById('pm-' + gameId);
    if (pmsg) pmsg.textContent = '분석 오류';
  }
}

function parseResult(text) {
  const g = k => { const m = text.match(new RegExp(k + ':\\s*(.+)')); return m ? m[1].trim() : null; };
  return { grade: g('GRADE'), pick: g('PICK'), odds: g('ODDS_TARGET'), conf: g('CONFIDENCE'), market: g('MARKET'), reason: g('REASON'), risk: g('RISK'), pass: g('CHECKLIST_PASS'), fail: g('CHECKLIST_FAIL'), action: g('MODEL_ACTION') };
}

function showDetail(id, text) {
  const g = games.find(x => x.id === id);
  if (!g) return;
  const p = parseResult(text);
  const cl = CFG[sport].checklist;
  const passItems = (p.pass || '').split(/[,·]/).map(s => s.trim()).filter(Boolean);
  const failItems = (p.fail || '').split(/[,·]/).map(s => s.trim()).filter(Boolean);
  const clHtml = cl.map(item => {
    const isPass = passItems.some(x => item.includes(x.substring(0, 4)) || x.includes(item.substring(0, 4)));
    const isFail = failItems.some(x => item.includes(x.substring(0, 4)) || x.includes(item.substring(0, 4)));
    const cls = isFail ? 'cl-fail' : isPass ? 'cl-ok' : 'cl-wait';
    const icon = isFail ? '✕' : isPass ? '✓' : '?';
    return `<div class="cl-item"><div class="cl-icon ${cls}">${icon}</div>${item}</div>`;
  }).join('');
  const isGood = p.grade === 'A' || p.grade === 'A-' || p.grade === 'B+';
  document.getElementById('emptyDetail').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'block';
  dc.innerHTML = `
    <button class="mobile-back" onclick="goBack()">← 목록으로</button>
    <div class="detail-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${leagueLabel} · ${kst(g.commence_time)} KST</div>
          <div style="font-size:18px;font-weight:700">${g.away_team}</div>
          <div style="font-size:13px;color:var(--text2);margin:2px 0">@ ${g.home_team}</div>
        </div>
        ${p.grade ? `<span class="grade-badge ${gradeClass(p.grade)}" style="font-size:16px;padding:6px 14px">${p.grade}</span>` : ''}
      </div>
      ${isGood ? `
      <div style="background:var(--green-dim);border:1px solid rgba(34,201,122,0.2);border-radius:10px;padding:16px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:6px">최종 추천</div>
        <div class="rec-main">${p.pick || '—'}</div>
        <div class="rec-sub">시장: ${p.market || '—'}</div>
        <div class="rec-meta-grid">
          <div class="rec-meta-item"><div class="rec-meta-label">목표 배당</div><div class="rec-meta-val">${p.odds || '—'}</div></div>
          <div class="rec-meta-item"><div class="rec-meta-label">확신도</div><div class="rec-meta-val">${p.conf || '—'}%</div></div>
          <div class="rec-meta-item"><div class="rec-meta-label">등급</div><div class="rec-meta-val">${p.grade || '—'}</div></div>
          <div class="rec-meta-item"><div class="rec-meta-label">모델액션</div><div class="rec-meta-val" style="font-size:11px">${p.action || '—'}</div></div>
        </div>
      </div>
      ` : `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">결론</div>
        <div style="font-size:15px;font-weight:600;color:var(--text2)">${p.pick || '패스'} · ${p.grade || '—'}</div>
      </div>
      `}
      ${p.reason ? `<div class="detail-title">분석 근거</div><div class="reason-text">${p.reason}</div>` : ''}
      ${p.risk ? `<div class="risk-box">리스크: ${p.risk}</div>` : ''}
    </div>
    <div class="detail-card">
      <div class="detail-title">풀체크 체크리스트</div>
      <div class="checklist-grid">${clHtml}</div>
    </div>
    <div class="detail-card" style="font-size:12px;color:var(--text3)">
      <div class="detail-title">원본 분석 텍스트</div>
      <pre style="white-space:pre-wrap;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);line-height:1.6">${text}</pre>
    </div>
  `;
}

function goBack() {
  document.getElementById('detailPanel').style.display = 'none';
  document.getElementById('sidebar').style.display = 'flex';
}

function updateStats() {
  const done = Object.values(analyses).filter(v => v && v !== 'pending' && v !== 'error').length;
  document.getElementById('st-done').textContent = done;
  let picks = 0, confSum = 0, confCount = 0;
  const minO = parseFloat(document.getElementById('minOdds').value);
  games.forEach(g => {
    const t = analyses[g.id];
    if (!t || t === 'pending' || t === 'error') return;
    const p = parseResult(t);
    if (p.grade === 'A' || p.grade === 'A-' || p.grade === 'B+') {
      if (!p.odds || p.odds === '—' || parseFloat(p.odds) >= minO) picks++;
    }
    if (p.conf) { confSum += parseInt(p.conf); confCount++; }
  });
  document.getElementById('st-picks').textContent = picks;
  document.getElementById('st-rate').textContent = confCount ? Math.round(confSum / confCount) + '%' : '—';
}

function buildPrompt(sp, lg, away, home, time, oddsAway, oddsHome, spread, total) {
  return `당신은 스포츠 베팅 풀체크 분석 전문가입니다. 웹서치로 최신 정보를 반드시 확인하고 아래 기준을 엄격하게 적용하세요.

경기: ${lg} | ${away} @ ${home}
한국시간: ${time}
홈배당: ${oddsHome || '미확인'} | 원정배당: ${oddsAway || '미확인'} | 핸디: ${spread || '미확인'} | 총점기준: ${total || '미확인'}

[풀체크 체크리스트 — 전항목 웹서치 필수]
${CFG[sp].checklist.map((c, i) => `${i + 1}. ${c}`).join('\n')}

[종목별 엄격 분석 규칙]
${CFG[sp].rules}

[응답 형식 — 반드시 준수]
GRADE: A/A-/B+/B/C/PASS
PICK: 구체적 추천
ODDS_TARGET: 추천 배당
CONFIDENCE: 0-100
MARKET: ML/F5/핸디캡/언더/오버/BTTS/패스
REASON: 핵심근거 3-4줄 (웹서치 확인 지표 명시)
RISK: 리스크 1-2줄
CHECKLIST_PASS: 확인완료 항목들
CHECKLIST_FAIL: 미확인/실패 항목들
MODEL_ACTION: 유지/하향보정/상향보정/조건부유지/패스

핵심: 체크리스트 미통과시 A급 절대금지. 배당1.5미만 전면제외.`;
}

// Init
renderLeagues();

// Mobile init
if (window.innerWidth <= 768) {
  document.getElementById('sidebar').style.display = 'flex';
  document.getElementById('detailPanel').style.display = 'none';
}
</script>
